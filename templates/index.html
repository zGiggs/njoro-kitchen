cat > templates/index.html << 'EOF'
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Njoro Kitchen - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1555939594-58d7cb561ad1?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            position: relative;
        }
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
        }
        .login-card {
            max-width: 450px;
            margin: 80px auto;
            border: none;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            background-color: white;
        }
        .card-header {
            background: linear-gradient(135deg, #2c3e50, #1a252f);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 30px;
            text-align: center;
        }
        .btn-login {
            background: linear-gradient(135deg, #007bff, #0056b3);
            border: none;
            padding: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,123,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card card">
            <div class="card-header">
                <i class="bi bi-egg-fried display-4"></i>
                <h2 class="mt-2">Njoro Kitchen</h2>
                <p class="mb-0">Automated Order Management System</p>
            </div>
            <div class="card-body p-4">
                {% with messages = get_flashed_messages() %}
                    {% if messages %}
                        {% for msg in messages %}
                            <div class="alert alert-info">{{ msg }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
                
                <form action="/login" method="POST">
                    <div class="mb-3">
                        <label class="fw-bold">I am a:</label>
                        <select name="role" class="form-select" id="roleSelect" required>
                            <option value="customer">👤 Customer</option>
                            <option value="waiter">🧑‍🍳 Waiter</option>
                            <option value="cook">👨‍🍳 Cook</option>
                            <option value="admin">👑 Administrator</option>
                        </select>
                    </div>
                    
                    <div id="customerFields">
                        <div class="mb-3">
                            <label class="fw-bold">Your Name</label>
                            <input type="text" name="customer_name" class="form-control" value="Guest">
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold">Table Number</label>
                            <select name="table" class="form-select">
                                {% for i in range(1, 21) %}
                                <option value="{{ i }}">Table {{ i }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    
                    <div id="staffFields" style="display: none;">
                        <div class="mb-3">
                            <label class="fw-bold" id="loginLabel">Username/Email</label>
                            <input type="text" name="login_id" class="form-control" placeholder="Enter username or email">
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter password">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-login w-100 mt-3">Continue</button>
                </form>
                
                <div class="text-center mt-3">
                    <small class="text-muted">Njoro Kitchen © 2026</small>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('roleSelect').addEventListener('change', function() {
            const customer = document.getElementById('customerFields');
            const staff = document.getElementById('staffFields');
            const label = document.getElementById('loginLabel');
            
            if (this.value === 'customer') {
                customer.style.display = 'block';
                staff.style.display = 'none';
            } else {
                customer.style.display = 'none';
                staff.style.display = 'block';
                
                if (this.value === 'admin') {
                    label.innerHTML = 'Email Address';
                } else {
                    label.innerHTML = 'Username';
                }
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
EOF
