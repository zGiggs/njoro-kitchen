{% extends "base.html" %}

{% block title %}Order Tracking{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="card">
        <div class="card-header bg-primary text-white">
            <h3>Order #{{ order.order_number }}</h3>
        </div>
        <div class="card-body">
            <p>Table: {{ order.table_number }}</p>
            <p>Status: <span class="badge bg-{{ 'success' if order.payment_status=='paid' else 'warning' }}">{{ order.status }}</span></p>
            <p>Total: KSh {{ "%.2f"|format(order.total_amount) }}</p>
            <a href="/menu" class="btn btn-primary">Back to Menu</a>
        </div>
    </div>
</div>
{% endblock %}
