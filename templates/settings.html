cat > templates/settings.html << 'EOF'
{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <h2 class="mb-4"><i class="bi bi-gear"></i> System Settings</h2>
    
    <div class="row">
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Restaurant Information</h5>
                </div>
                <div class="card-body">
                    <form>
                        <div class="mb-3">
                            <label class="fw-bold">Restaurant Name</label>
                            <input type="text" class="form-control" value="Njoro Kitchen">
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold">Email</label>
                            <input type="email" class="form-control" value="info@njoro.com">
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold">Phone</label>
                            <input type="text" class="form-control" value="+254 700 000 000">
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold">Address</label>
                            <textarea class="form-control">123 Kenyatta Ave, Nairobi</textarea>
                        </div>
                        <button class="btn btn-primary">Save Changes</button>
                    </form>
                </div>
            </div>
        </div>
        
        <div class="col-md-6">
            <div class="card mb-4">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">M-Pesa Settings</h5>
                </div>
                <div class="card-body">
                    <form>
                        <div class="mb-3">
                            <label class="fw-bold">Consumer Key</label>
                            <input type="text" class="form-control" value="••••••••••••••••">
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold">Consumer Secret</label>
                            <input type="password" class="form-control" value="••••••••••••••••">
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold">Passkey</label>
                            <input type="password" class="form-control" value="••••••••••••••••">
                        </div>
                        <div class="mb-3">
                            <label class="fw-bold">Shortcode</label>
                            <input type="text" class="form-control" value="174379">
                        </div>
                        <button class="btn btn-success">Update M-Pesa Settings</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <div class="card">
        <div class="card-header bg-warning text-dark">
            <h5 class="mb-0">System Preferences</h5>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="notifications" checked>
                        <label class="form-check-label">Enable Email Notifications</label>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="autoPrint" checked>
                        <label class="form-check-label">Auto-print Kitchen Orders</label>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-check form-switch mb-3">
                        <input class="form-check-input" type="checkbox" id="maintenance">
                        <label class="form-check-label">Maintenance Mode</label>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
EOF
